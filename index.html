<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupos VIP</title>

<!-- Font Awesome para iconos originales -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://i.ibb.co/NgmYkjjJ/IMG-20260430-195706-867.jpg");
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.35);
z-index:-1;
}

/* PORTADA +18 */
#portada{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://i.ibb.co/NgmYkjjJ/IMG-20260430-195706-867.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
transition:opacity .5s;
}

.overlay{
background:rgba(0,0,0,0.55);
padding:40px 30px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(3px);
box-shadow:0 0 25px rgba(0,255,255,0.4);
}

.overlay h1{
color:#fff;
font-size:22px;
line-height:1.5;
}

.overlay span{
display:block;
color:#00e0c0;
font-size:26px;
font-weight:bold;
margin-top:6px;
}

.btns{
display:flex;
flex-direction:column;
gap:12px;
margin-top:25px;
align-items:center;
}

button{
border:none;
border-radius:25px;
padding:12px 30px;
cursor:pointer;
width:200px;
}

.btn-trans{
background:transparent;
border:1px solid #00e0c0;
color:#00e0c0;
}

.btn-cyan{
background:#00e0c0;
color:#000;
}

#floatingAd{
position:absolute;
bottom:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
cursor:pointer;
opacity:0;
transition:opacity 1s;
border:4px solid #0ea5bf;
box-shadow:0 0 20px rgba(110,255,155,0.6);
}

#floatingAd img{
width:50px;
height:50px;
border-radius:50%;
}

#statusCircle{
position:absolute;
width:13px;
height:13px;
background:#28a745;
border:3px solid white;
border-radius:50%;
bottom:0;
right:0;
}

#messageCount{
position:absolute;
top:0;
left:0;
width:18px;
height:18px;
background:#ff1a1a;
color:#fff;
font-size:13px;
font-weight:bold;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* MENU */
.menu{
width:320px;
background:rgba(0,0,0,0.75);
padding:20px;
border-radius:15px;
backdrop-filter:blur(5px);
}

.group-btn{
display:flex;
align-items:center;
width:100%;
background:#1e1e1e;
border:none;
padding:10px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
color:white;
transition:.2s;
}

.group-btn:hover{
background:#2c2c2c;
transform:scale(1.03);
}

.img-wrap{
position:relative;
margin-right:12px;
}

.group-img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid #2ea6ff;
pointer-events:none;
user-select:none;
}

.blur-img{
filter:blur(2px) brightness(.7);
}

.photo-lock{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:18px;
height:18px;
animation:lockFloat 1.4s infinite ease-in-out;
}

@keyframes lockFloat{
0%{transform:translate(-50%,-50%) translateY(0)}
50%{transform:translate(-50%,-50%) translateY(-3px)}
100%{transform:translate(-50%,-50%) translateY(0)}
}

.group-info{
display:flex;
flex-direction:column;
}

.group-name{
font-size:16px;
font-weight:bold;
}

.stats{
display:flex;
gap:12px;
font-size:13px;
color:#e6e6e6;
margin-top:3px;
}

.stat{
display:flex;
align-items:center;
gap:5px;
}

.icon{
font-size:12px;
color:#e6e6e6;
}

.emoji{
margin-left:auto;
font-size:20px;
animation:float 1.5s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-4px)}
100%{transform:translateY(0)}
}

.lock{
margin-left:auto;
width:22px;
height:22px;
}

.lock.shake{
animation:lockShake .35s;
}

@keyframes lockShake{
0%{transform:rotate(0)}
25%{transform:rotate(-15deg)}
50%{transform:rotate(15deg)}
75%{transform:rotate(-10deg)}
100%{transform:rotate(0)}
}

</style>
</head>

<body>

<div id="portada">

<div class="overlay">
<h1>Por favor confirme que tiene más de<br><span>18 años</span></h1>

<div class="btns">
<button class="btn-trans" onclick="window.close()">Salir</button>
<button class="btn-cyan" id="btn-si">Tengo +18</button>
</div>

</div>

<div id="floatingAd">
<img src="https://i.ibb.co/xqLPBhW7/2-1.jpg">
<div id="statusCircle"></div>
<div id="messageCount">2</div>
</div>

</div>

<div class="menu"></div>

<script>

/* PORTADA */
const portada=document.getElementById("portada");
const btnSi=document.getElementById("btn-si");
btnSi.onclick=()=>{
portada.style.opacity=0;
setTimeout(()=>{portada.style.display="none"},500);
};

/* ANUNCIO */
const floatingAd=document.getElementById("floatingAd");
function fadeAd(){
floatingAd.style.opacity="1";
setTimeout(()=>{floatingAd.style.opacity="0"},4000);
}
fadeAd();
setInterval(fadeAd,8000);
floatingAd.onclick=()=>{
window.open("https://t.me/TickBitEarn_bot?start=ref_5353490913","_blank");
};

/* TELEGRAM */
if(window.Telegram && Telegram.WebApp){
Telegram.WebApp.ready();
}

const groups=[
{name:"ONLYFANS 🏆",img:"https://i.ibb.co/5X0PQH3q/4-1.jpg",link:"tg://resolve?domain=XGroupHelpBot&startapp=onlyfans",id:"onlyfans"},
{name:"DEEP WEB 🔞",img:"https://i.ibb.co/NdP0DQJT/6.jpg",link:"tg://resolve?domain=XGroupHelpBot&startapp=deepweb",id:"deepweb"},
{name:"SUGAR DADDY 👅",img:"https://i.ibb.co/rK41hHPt/1-1.jpg",link:"tg://resolve?domain=XGroupHelpBot&startapp=sugardaddy",id:"sugardaddy"},
{name:"SCHOOL GIRL 👩🏻‍🏫🔞",img:"https://i.ibb.co/WWgDHP4H/IMG-20260417-113917-453.jpg",link:"tg://resolve?domain=XGroupHelpBot&startapp=schoolgirl",id:"schoolgirl"},
{name:"BRO 🔞 SIS",img:"https://i.ibb.co/FLVNcjr4/5-1.jpg",link:"tg://resolve?domain=XGroupHelpBot&startapp=valetodo",id:"valetodo"},
{name:"👩‍🏫F1LTR4D4S 🍓🍌",img:"https://i.ibb.co/NfJ1D4g/IMG-20260224-153246-400.jpg",link:"https://kut.lat/58D8",id:"transgay"},
{name:"🍑EXCLUSIVO💎",img:"https://i.ibb.co/tpt8d8Yt/IMG-20260617-034547-258.jpg",link:null,id:"exclusive"},
{name:"INCEST🎁",img:"https://i.ibb.co/zVgW7B3c/IMG-20251106-164202-134.jpg",link:"tg://resolve?domain=XGroupHelpBot&startapp=premium",id:"premium"}
];

const emojis=["🍑","💋","😈","📸","⚡","👀","🤤","😏","🍓","🎁","🍭","💦","🎬","🙈","🔥","😍","🥵","😱","🌶️","💣","🍒","👅","💎","🔞","🎉","😜","💫"];
const shuffled=[...emojis].sort(()=>0.5-Math.random());

groups.forEach((g,i)=>{
const btn=document.createElement("button");
btn.className="group-btn";
if(g.link){
btn.onclick=()=>openGroup(g.link);
}else{
btn.onclick=()=>{
const lock=document.getElementById(`lock-${g.id}`);
lock.classList.remove("shake");
void lock.offsetWidth;
lock.classList.add("shake");
alert("Este chat solo está disponible para miembros verificados.");
};
}

const emoji=g.id==="premium"?"⭐":shuffled[i];

btn.innerHTML=`
<div class="img-wrap">
<img class="group-img ${g.id==="premium"?"blur-img":""}" src="${g.img}">
${g.id==="premium"?`<img class="photo-lock" src="https://cdn-icons-png.flaticon.com/512/565/565547.png">`:""}
</div>

<div class="group-info">
<div class="group-name">${g.name}</div>
<div class="stats">

<div class="stat">
<i class="fas fa-eye icon"></i>
<span id="views-${g.id}"></span>
</div>

<div class="stat">
<i class="fas fa-user-plus icon"></i>
<span id="members-${g.id}"></span>
</div>

</div>
</div>

${g.id==="exclusive"
? `<img src="https://cdn-icons-png.flaticon.com/512/565/565547.png" class="lock" id="lock-${g.id}">`
: `<span class="emoji">${emoji}</span>`
}
`;

document.querySelector(".menu").appendChild(btn);
});

function format(n){
return n>=1000?(n/1000).toFixed(1)+"K":n;
}

function initCounters(){
const data={
onlyfans:{views:155000,members:95200},
deepweb:{views:146000,members:100200},
sugardaddy:{views:103300,members:89000},
schoolgirl:{views:160250,members:107500},
valetodo:{views:80300,members:60550},
transgay:{views:95100,members:81400},
exclusive:{views:82820,members:69500},
premium:{views:112200,members:95300}
};
groups.forEach(g=>{
document.getElementById(`views-${g.id}`).innerText=format(data[g.id].views);
document.getElementById(`members-${g.id}`).innerText=format(data[g.id].members);
});
}

initCounters();

function openGroup(link){
if(window.Telegram && Telegram.WebApp){
Telegram.WebApp.openTelegramLink(link);
}else{
window.open(link,"_blank");
}
}

</script>

</body>
</html>
